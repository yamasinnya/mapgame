<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛のブチ模様 - 自動生成デモ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1a12; min-height:100vh;
    font-family:'Georgia',serif;
    display:flex; flex-direction:column; align-items:center;
    padding:16px;
  }
  h1 { color:#d8c080; font-size:16px; letter-spacing:2px; margin-bottom:4px; }
  #sub { color:#8a8060; font-size:11px; margin-bottom:16px; }
  #grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    max-width:640px; width:100%;
  }
  .cow-box {
    background:#242418; border:1px solid #4a4a30; border-radius:8px;
    padding:8px; display:flex; flex-direction:column; align-items:center;
  }
  canvas { image-rendering:pixelated; width:100%; max-width:180px; }
  .cow-label { color:#a0a080; font-size:10px; margin-top:4px; }
  #btn-regen {
    margin-top:18px; padding:10px 24px;
    background:linear-gradient(135deg,#5a4a1a,#8a7020);
    color:#f0e0a0; font-size:13px; font-weight:bold;
    border:1.5px solid #c0a040; border-radius:8px; cursor:pointer;
    font-family:Georgia,serif;
  }
  #note {
    color:#6a6a50; font-size:10px; margin-top:14px; text-align:center;
    max-width:520px; line-height:1.6;
  }
</style>
</head>
<body>

<h1>🐄 ブチ模様 自動生成デモ</h1>
<div id="sub">同じイラストから、毛皮部分だけを判定してランダムにパッチを生成</div>

<div id="grid"></div>

<button id="btn-regen" onclick="regenerateAll()">🔄 もう一度生成する</button>

<div id="note">
  仕組み：画像内の「暗くて彩度の低いピクセル」だけを毛皮と判定し、鼻・耳標・目は自動で除外。
  そこにランダムな種からブロブ状にパッチを広げ、元の陰影を保ったまま色を乗せています。
</div>

const PATCH_COLORS = [
  { name:'白ブチ', color:[235,225,210] },
  { name:'茶ブチ', color:[150,100,60]  },
];

const cowImg = new Image();
cowImg.src = 'data:image/png;base64,' + COW_B64;

function isFur(r, g, b) {
  const lum = (r+g+b)/3;
  const maxc = Math.max(r,g,b);
  const minc = Math.min(r,g,b);
  const sat = maxc - minc;
  return lum < 150 && sat < 25;
}

function growBlob(furMask, w, h, seedIdx, size) {
  const visited = new Set();
  const frontier = [seedIdx];
  const result = [];
  while (frontier.length > 0 && result.length < size) {
    const pick = Math.floor(Math.random()*frontier.length);
    const idx = frontier.splice(pick,1)[0];
    if (visited.has(idx)) continue;
    const x = idx % w, y = Math.floor(idx / w);
    if (x<0||x>=w||y<0||y>=h) continue;
    if (!furMask[idx]) continue;
    visited.add(idx);
    result.push(idx);
    const neighbors = [idx-1, idx+1, idx-w, idx+w];
    neighbors.forEach(n => { if (!visited.has(n)) frontier.push(n); });
  }
  return result;
}

function drawPatchedCow(canvas) {
  const ctx = canvas.getContext('2d');
  const w = cowImg.width, h = cowImg.height;
  canvas.width = w; canvas.height = h;
  ctx.drawImage(cowImg, 0, 0);

  const imgData = ctx.getImageData(0,0,w,h);
  const data = imgData.data;

  // 毛皮マスク作成
  const furMask = new Uint8Array(w*h);
  for (let i=0; i<w*h; i++) {
    const r=data[i*4], g=data[i*4+1], b=data[i*4+2];
    furMask[i] = isFur(r,g,b) ? 1 : 0;
  }
  const furIdxs = [];
  for (let i=0; i<furMask.length; i++) if (furMask[i]) furIdxs.push(i);
  if (furIdxs.length === 0) return;

  // ランダムでパッチ色・数を決定
  const colorDef = PATCH_COLORS[Math.floor(Math.random()*PATCH_COLORS.length)];
  const nPatches = 2 + Math.floor(Math.random()*3); // 2〜4個

  for (let p=0; p<nPatches; p++) {
    const seed = furIdxs[Math.floor(Math.random()*furIdxs.length)];
    const size = 60 + Math.floor(Math.random()*140);
    const blob = growBlob(furMask, w, h, seed, size);
    blob.forEach(idx => {
      const r=data[idx*4], g=data[idx*4+1], b=data[idx*4+2];
      const brightness = Math.min(Math.max((r+g+b)/3/30, 0.5), 1.3);
      data[idx*4]   = Math.min(255, colorDef.color[0]*brightness);
      data[idx*4+1] = Math.min(255, colorDef.color[1]*brightness);
      data[idx*4+2] = Math.min(255, colorDef.color[2]*brightness);
    });
  }

  ctx.putImageData(imgData, 0, 0);
  return colorDef.name;
}

function regenerateAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i=0; i<6; i++) {
    const box = document.createElement('div');
    box.className = 'cow-box';
    const canvas = document.createElement('canvas');
    box.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'cow-label';
    grid.appendChild(box);
    box.appendChild(label);

    const patchName = drawPatchedCow(canvas);
    label.textContent = '個体 #' + (i+1) + '（' + patchName + '）';
  }
}

cowImg.onload = () => { regenerateAll(); };
