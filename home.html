<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>やまやま牧場 - ホーム</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a1506; min-height:100vh;
  font-family:'Hiragino Kaku Gothic ProN','MS Gothic',sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.screen-wrap {
  width:100%; max-width:440px;
  position:relative;
  overflow:hidden;
  aspect-ratio: 941 / 1350;
}
.bg-img {
  position:absolute; top:0; left:0;
  width:100%; display:block;
}

/* 配置物（ドット素材） */
.placed {
  position:absolute;
  image-rendering:pixelated;
  filter:drop-shadow(0 6px 4px rgba(0,0,0,0.35));
}
.shadow-blob {
  position:absolute;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 70%);
  border-radius:50%;
}

/* 共通ヘッダー（指示書_共通ヘッダー実装.md対応） */
.game-header {
  width:100%; max-width:440px;
  background: rgba(10, 10, 10, 0.88);
  padding: 6px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #444;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-date { font-size: 11px; color: #c8c080; letter-spacing: 1px; }
.header-day  { font-size: 10px; color: #708060; }
.header-stats { display: flex; gap: 10px; align-items: center; }
.header-stats span { font-size: 12px; font-weight: bold; }
.stat-mana { color: #90d060; }
.stat-gold { color: #f0d060; }
.stat-wara { color: #e0e0d0; display: flex; align-items: center; gap: 3px; }
.wrap-icon { width: 18px; height: 18px; image-rendering: pixelated; }

/* 下部ボタン群 */
.bottom-ui {
  position:absolute; bottom:0; left:0; right:0;
  padding:8px 12px 12px;
  background:linear-gradient(0deg,#000000cc 0%,transparent 100%);
  z-index:10;
}
.btn-main {
  width:100%; padding:13px 0;
  background:linear-gradient(135deg,#2a5a10dd,#3a8018dd);
  color:#d8f8a0; font-size:19px; font-weight:bold;
  border:1.5px solid #5a9a28; border-radius:12px;
  cursor:pointer; font-family:inherit; letter-spacing:1px;
  margin-bottom:8px;
  box-shadow:0 2px 12px #00000066;
}
.sub-row {
  display:flex; gap:6px;
}
.btn-sub {
  flex:1; padding:8px 0;
  background:#0a2008cc; color:#90c060;
  font-size:14px; border:1px solid #2a5010;
  border-radius:8px; cursor:pointer; font-family:inherit;
  text-align:center;
}

</style>
</head>
<body>

<div id="gameHeader" class="game-header"></div>
<div class="screen-wrap">
  <img class="bg-img" src="mapback.png" alt="牧場背景">

  <!-- 奥列：建物（小さめ） -->
  <div class="shadow-blob" style="left:5.12%; top:53.81%; width:11.90%; height:2.33%;"></div>
  <img class="placed" style="left:4%; top:47%; width:14%;" src="assets/sprites/gyusha_large.png" alt="牛舎（大）">
  <div class="shadow-blob" style="left:20.88%; top:54.06%; width:9.35%; height:1.90%;"></div>
  <img class="placed" style="left:20%; top:48.5%; width:11%;" src="assets/sprites/shiryoko.png" alt="飼料庫">
  <div class="shadow-blob" style="left:33.52%; top:52.47%; width:5.52%; height:2.55%;"></div>
  <img class="placed" style="left:33%; top:45%; width:6.5%;" src="assets/sprites/silo.png" alt="サイロ">
  <div class="shadow-blob" style="left:41.84%; top:53.03%; width:8.92%; height:1.37%;"></div>
  <img class="placed" style="left:41%; top:49%; width:10.5%;" src="assets/sprites/taihisha.png" alt="堆肥舎">
  <div class="shadow-blob" style="left:54.00%; top:51.87%; width:10.62%; height:1.49%;"></div>
  <img class="placed" style="left:53%; top:47.5%; width:12.5%;" src="assets/sprites/wrap_wara.png" alt="ラップ藁置き場">
  <div class="shadow-blob" style="left:67.72%; top:54.15%; width:7.65%; height:1.93%;"></div>
  <img class="placed" style="left:67%; top:48.5%; width:9%;" src="assets/sprites/sagyogoya.png" alt="作業小屋">

  <!-- 中列：車両（中くらい） -->
  <div class="shadow-blob" style="left:5.20%; top:66.41%; width:12.75%; height:2.19%;"></div>
  <img class="placed" style="left:4%; top:60%; width:15%;" src="assets/sprites/keitora.png" alt="軽トラック">
  <div class="shadow-blob" style="left:25.04%; top:64.66%; width:11.05%; height:2.28%;"></div>
  <img class="placed" style="left:24%; top:58%; width:13%;" src="assets/sprites/tractor.png" alt="トラクター">
  <div class="shadow-blob" style="left:41.12%; top:64.52%; width:11.90%; height:1.71%;"></div>
  <img class="placed" style="left:40%; top:59.5%; width:14%;" src="assets/sprites/wheel_loader.png" alt="ホイールローダ">
  <div class="shadow-blob" style="left:59.12%; top:64.73%; width:11.90%; height:2.47%;"></div>
  <img class="placed" style="left:58%; top:57.5%; width:14%;" src="assets/sprites/shiryo_mixer.png" alt="飼料ミキサー">
  <div class="shadow-blob" style="left:76.88%; top:66.05%; width:9.35%; height:1.73%;"></div>
  <img class="placed" style="left:76%; top:61%; width:11%;" src="assets/sprites/buggy.png" alt="バギー">

  <!-- 手前列：牛（大きめ） -->
  <div class="shadow-blob" style="left:9.28%; top:76.80%; width:13.60%; height:2.32%;"></div>
  <img class="placed" style="left:8%; top:70%; width:16%;" src="assets/sprites/cow_mother.png" alt="母牛">
  <div class="shadow-blob" style="left:28.88%; top:79.53%; width:9.35%; height:1.89%;"></div>
  <img class="placed" style="left:28%; top:74%; width:11%;" src="assets/sprites/cow_4m.png" alt="子牛4ヶ月">
  <div class="shadow-blob" style="left:46.28%; top:78.80%; width:13.60%; height:2.32%;"></div>
  <img class="placed" style="left:45%; top:72%; width:16%;" src="assets/sprites/cow_mother.png" alt="母牛">
  <div class="shadow-blob" style="left:65.76%; top:80.78%; width:8.07%; height:1.63%;"></div>
  <img class="placed" style="left:65%; top:76%; width:9.5%;" src="assets/sprites/cow_2m.png" alt="子牛2ヶ月">
  <div class="shadow-blob" style="left:79.28%; top:77.80%; width:13.60%; height:2.32%;"></div>
  <img class="placed" style="left:78%; top:71%; width:16%;" src="assets/sprites/cow_mother.png" alt="母牛">

  <div class="bottom-ui">
    <button class="btn-main" id="btn-explore"></button>
    <div class="sub-row">
      <button class="btn-sub" id="btn-barn">🐄 牛舎</button>
      <button class="btn-sub" id="btn-shop">🏪 ショップ</button>
      <button class="btn-sub">📖 日誌</button>
      <button class="btn-sub">🔑 呪文</button>
    </div>
  </div>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/common.js"></script>
<script>
(async function () {
  await loadDict();
  renderHeader('gameHeader');

  const btn = document.getElementById('btn-explore');
  btn.textContent = t('go_explore');
  btn.addEventListener('click', () => { location.href = 'map.html'; });

  document.getElementById('btn-barn').addEventListener('click', () => { location.href = 'barn.html'; });
  document.getElementById('btn-shop').addEventListener('click', () => { location.href = 'street.html'; });
})();
</script>

</body>
</html>
